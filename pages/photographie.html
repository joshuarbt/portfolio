<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photographie</title>

    <link rel="stylesheet" href="../styles/photographie.css">
</head>

<body>

    <!-- chargement -->
    <div id="loading-screen">
        <div class="loader-text">Chargement...</div>
    </div>
    <!-- fresque -->
    <div id="viewport">
        <div id="fresco">

            <div id="intro-text">
                <p class="small-text">instagram : @dcd0ck.raw</p>
                <h1>PHOTOGRAPHIE</h1>
                <p class="small-text">Retrouvez toutes mes photographies dans différents ilots</p>
                <br>
                <p class="small-text">navigation :</p>
                <p class="small-text">souris → déplacement</p>
                <p class="small-text">molette → zoom</p>
            </div>

            <!-- premier îlot de photos -->
            <div class="island" style="top: 2200px; left: 1500px;">
                <div class="fresco-item photo-box"
                    style="top: 0px; left: 50px; width: 140px; height: 200px; background-image: url('https://via.placeholder.com/140x200');">
                </div>
                <div class="fresco-item photo-box"
                    style="top: 150px; left: 220px; width: 160px; height: 230px; background-image: url('https://via.placeholder.com/160x230');">
                </div>
                <div class="fresco-item photo-box"
                    style="top: 320px; left: -50px; width: 170px; height: 240px; background-image: url('https://via.placeholder.com/170x240');">
                </div>
                <div class="fresco-item photo-box"
                    style="top: 400px; left: 140px; width: 150px; height: 200px; background-image: url('https://via.placeholder.com/150x200');">
                </div>

                <div class="fresco-item grey-box" style="top: 220px; left: 40px; width: 160px; height: 80px;">
                test
                </div>
            </div>

            <div class="island" style="top: 2400px; left: 3200px;">
                <div class="fresco-item photo-box"
                    style="top: 0px; left: 50px; width: 280px; height: 180px; background-image: url('https://via.placeholder.com/280x180');">
                </div>
                <div class="fresco-item photo-box"
                    style="top: 310px; left: -100px; width: 260px; height: 170px; background-image: url('https://via.placeholder.com/260x170');">
                </div>
                <div class="fresco-item photo-box"
                    style="top: 200px; left: 190px; width: 160px; height: 240px; background-image: url('https://via.placeholder.com/160x240');">
                </div>

                <div class="fresco-item grey-box" style="top: 200px; left: 10px; width: 160px; height: 90px;">
                    Concert Paris
                </div>
            </div>

        </div>
    </div>

    <script src="../scripts/photographie.js"></script>
</body>

</html>
